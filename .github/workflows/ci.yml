# ============================================================
# RDC Server — CI Pipeline (T-6.8)
# ============================================================
# Runs on every push and pull request to main.
# Steps:
#   1. Checkout code
#   2. Set up Go 1.25
#   3. Download dependencies
#   4. Run go vet
#   5. Run go build
#   6. Run tests
#   7. Build Docker image (optional, for deploy)
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Build + Test ---
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: source/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run go build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Check file sizes (≤200 lines per file, excluding tests)
        run: |
          # Find Go files that exceed 200 lines (excluding _test.go files)
          oversize=$(find . -name "*.go" ! -name "*_test.go" -exec sh -c '
            lines=$(wc -l < "$1")
            if [ "$lines" -gt 200 ]; then
              echo "  $1: $lines lines"
            fi
          ' _ {} \;)
          if [ -n "$oversize" ]; then
            echo "::error::Files exceeding 200 lines (production code):"
            echo "$oversize"
            exit 1
          fi
          echo "All production files are under 200 lines"

  # --- Docker build ---
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rdc-server:latest .

      - name: Verify image was built
        run: docker images rdc-server:latest
